
<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="overlay">
  <h1>Checkout</h1>

  <h2 id="orderType"></h2>
  <h3 id="priceText"></h3>

  <div class="form-box">
    <input id="user" placeholder="Roblox Username">
    <input id="pose" placeholder="Pose">
    <input id="color" placeholder="Preferred Colour">
    <textarea id="details" placeholder="Extra Details"></textarea>

    <button class="btn" onclick="sendOrder()">Send Order</button>
  </div>
</div>

<script>
function getType() {
  const params = new URLSearchParams(window.location.search);
  return params.get("type") || "order";
}

const type = getType();
const orderTypeText = document.getElementById("orderType");
const priceText = document.getElementById("priceText");

let title = "ORDER";

if (type === "gfx") {
  title = "GFX ORDER";
  priceText.innerText = "80 robux / 1 godly";
}
if (type === "banner") {
  title = "BANNER ORDER";
  priceText.innerText = "160 robux / 2 godlies";
}
if (type === "thumbnail") {
  title = "THUMBNAIL ORDER";
  priceText.innerText = "240 robux / 3 godlies";
}

orderTypeText.innerText = title;

async function sendOrder() {

  const webhook = "https://corsproxy.io/?https://discord.com/api/webhooks/1501392563251318784/Az0me-mj2rTm-IgBbsc1Vc-AUdT14KS1pMwpvubE4cwbRFYzP2ByADNJ3gsoOjfvhVsM";

  const user = document.getElementById("user").value;
  const pose = document.getElementById("pose").value;
  const color = document.getElementById("color").value;
  const details = document.getElementById("details").value;

  const payload = {
    content: `🛍️ NEW ${title}
-------------------
Username: ${user}
Pose: ${pose}
Colour: ${color}
Details: ${details}`
  };

  try {
    const res = await fetch(webhook, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      alert("Order sent!");
    } else {
      alert("Failed to send.");
    }

  } catch (err) {
    alert("Error sending.");
    console.error(err);
  }
}
</script>

</body>
</html>
