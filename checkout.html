<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">CHECKOUT</h1>

<div class="form">

<input id="user" placeholder="Roblox username">
<input id="pose" placeholder="Pose wanted">
<input id="color" placeholder="Preferred colour">
<textarea id="details" placeholder="Extra details"></textarea>

<button class="btn" onclick="order()">Send Order</button>

</div>

<script>
const webhook = "https://discord.com/api/webhooks/1501576085308182628/zuaR4p-qrjZc6shGRRintawI14RkMR6f1TbIRwtZPSXIMIviczfT5anEC_yvlT1W3SxY";

function order() {
    const type = new URLSearchParams(window.location.search).get("type");

    let title =
        type === "gfx" ? "NEW GFX ORDER" :
        type === "banner" ? "NEW BANNER ORDER" :
        "NEW THUMBNAIL ORDER";

    fetch(webhook, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            content: `${title}
Username: ${user.value}
Pose: ${pose.value}
Color: ${color.value}
Details: ${details.value}`
        })
    });

    alert("Sent!");
}
</script>

</body>
</html>
