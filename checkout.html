<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DynaPuff&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay">

  <h1>🛍️ Checkout</h1>

  <!-- shows selected item -->
  <h2 id="orderTypeTitle"></h2>

  <input id="user" placeholder="Roblox Username">
  <input id="pose" placeholder="Pose you want">
  <input id="color" placeholder="Preferred Colour">
  <textarea id="details" placeholder="Extra details..."></textarea>

  <button class="btn" onclick="sendOrderFromCheckout()">
    Send Order
  </button>

</div>

<script src="script.js"></script>

<!-- displays selected type -->
<script>
  const params = new URLSearchParams(window.location.search);
  const type = params.get("type");

  const title = document.getElementById("orderTypeTitle");

  if (type === "gfx") {
    title.innerText = "GFX ORDER - 80R$ / 1 godly";
  }

  if (type === "banner") {
    title.innerText = "BANNER ORDER - 160R$ / 2 godlies";
  }

  if (type === "thumbnail") {
    title.innerText = "THUMBNAIL ORDER - 240R$ / 3 godlies";
  }
</script>

</body>
</html>
