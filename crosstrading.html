<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cross Trading</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DynaPuff&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay">

  <h1>🔁 Cross Trading</h1>

  <select id="giveType">
    <option disabled selected>What are you trading?</option>
    <option>ADM</option>
    <option>RBX</option>
    <option>MM2</option>
  </select>

  <input id="item" placeholder="What ITEM are you trading?">

  <select id="wantType">
    <option disabled selected>What are you looking for?</option>
    <option>MM2</option>
    <option>ADM</option>
    <option>RBX</option>
  </select>

  <input id="username" placeholder="Roblox Username">

  <button class="btn" onclick="sendTrade()">
    Send Cross Trade
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
