<!DOCTYPE html>
<html>
<head>
  <title>Cross Trading</title>

  <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="overlay">

<h1>Cross Trading</h1>

<div class="form-box">

<p>1. what are you trading?</p>
<select id="tradeType">
  <option value="adm">adm</option>
  <option value="rbx">rbx</option>
  <option value="mm2">mm2</option>
</select>

<input id="items" placeholder="what item(s) are you trading?">

<p>2. what are you looking for?</p>
<select id="lookingFor">
  <option value="adm">adm</option>
  <option value="rbx">rbx</option>
  <option value="mm2">mm2</option>
</select>

<input id="username" placeholder="Roblox username">

<button class="btn" onclick="sendTrade()">Send Order</button>

</div>

</div>

<script>
async function sendTrade() {

const webhook = "https://corsproxy.io/?https://discord.com/api/webhooks/1501392563251318784/Az0me-mj2rTm-IgBbsc1Vc-AUdT14KS1pMwpvubE4cwbRFYzP2ByADNJ3gsoOjfvhVsM";

  const tradeType = document.getElementById("tradeType").value;
  const items = document.getElementById("items").value;
  const lookingFor = document.getElementById("lookingFor").value;
  const username = document.getElementById("username").value;

  const payload = {
    content: `🔁 CROSS TRADE:
-------------------
Trading: ${tradeType}
Items: ${items}
Looking For: ${lookingFor}
Username: ${username}`
  };

  try {
    const res = await fetch(webhook, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (res.ok) {
      alert("Sent!");
    } else {
      alert("Failed to send.");
    }

  } catch (err) {
    alert("Error sending trade.");
    console.error(err);
  }
}
</script>

</body>
</html>
