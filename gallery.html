<!DOCTYPE html>
<html>
<head>
  <title>Gallery</title>

  <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    .gallery-section {
      margin-top: 40px;
    }

    .gallery-title {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .grid img {
      width: 250px;
      height: 250px;
      object-fit: cover;
      border-radius: 15px;
      border: 3px solid rgba(0, 200, 255, 0.6);
      transition: 0.3s;
    }

    .grid img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="overlay">

<h1>Gallery</h1>

<!-- GFX SECTION -->

  <div class="gallery-title">GFXs</div>
  <div class="grid">
